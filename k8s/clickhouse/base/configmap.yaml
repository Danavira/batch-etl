apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: data
data:
  01-listen.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
      <http_port>8123</http_port>
      <tcp_port>9000</tcp_port>
    </clickhouse>

  02-users.xml: |
    <clickhouse>
      <users>
        <default>
          <password from_env="CLICKHOUSE_PASSWORD"/>
          <networks>
            <ip>::/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
        </default>
      </users>
    </clickhouse>